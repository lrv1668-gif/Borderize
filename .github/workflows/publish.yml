name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    # Must match the Environment configured on the nuget.org Trusted Publishing
    # policy, so the OIDC token carries the expected 'environment' claim.
    environment: production
    permissions:
      id-token: write   # required for NuGet Trusted Publishing (OIDC token exchange)
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Derive and validate version from release tag
        id: version
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          version="${TAG#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag '$TAG' is not a valid version (expected vN.N.N or N.N.N, optional -prerelease)."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Publishing version $version"

      - name: Run tests in Docker (gate)
        run: docker build --target test .

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Pack
        run: dotnet pack Borderize.csproj -c Release -p:Version=${{ steps.version.outputs.version }} -o ./nupkg

      # Trusted Publishing: exchange the GitHub OIDC token for a short-lived (1h)
      # NuGet API key. Requested immediately before push so it doesn't expire.
      # NUGET_USER is the nuget.org profile name (NOT an email) that owns the
      # trusted publishing policy configured on nuget.org for this repo + workflow.
      - name: NuGet login (OIDC → temporary API key)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: >
          dotnet nuget push "./nupkg/*.nupkg"
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
